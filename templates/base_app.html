{% extends "base.html" %}

{% block body %}
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="MusicApp" class="logo-img">
                <span class="logo-text">MusicApp</span>
            </div>
        </div>

        <div class="user-badge">
            <div class="avatar">{{ session['username'][0]|upper }}</div>
            <span class="username">{{ session['username'] }}</span>
        </div>

        <nav class="sidebar-nav">
            <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Home
            </a>
            <a href="/profile" class="nav-item {% if request.path == '/profile' %}active{% endif %}">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
                Profile
            </a>
            <a href="/playlist" class="nav-item {% if request.path == '/playlist' %}active{% endif %}">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                Playlist
            </a>
            <a href="/history" class="nav-item {% if request.path == '/history' %}active{% endif %}">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                History
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="/logout" class="nav-item logout-link">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Logout
            </a>
        </div>
    </aside>

    <main class="main-content">
        {% block app_content %}{% endblock %}
    </main>
</div>

{% block bottom_player %}{% endblock %}
{% endblock %}
