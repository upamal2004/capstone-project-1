{% extends "base.html" %}

{% block body %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
(function() {
    'use strict';
    var _pendingSong = null;
    var _ready = false;
    var _loadSong;

    window.addEventListener('song:play', function(e) {
        if (_ready) {
            _loadSong(e.detail);
        } else {
            _pendingSong = e.detail;
        }
    });

    window.__playerReady = function(loadFn) {
        _loadSong = loadFn;
        _ready = true;
        if (_pendingSong) {
            _loadSong(_pendingSong);
            _pendingSong = null;
        }
    };
})();
</script>

<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="MusicApp" class="logo-img">
                <span class="logo-text">MusicApp</span>
            </div>
        </div>

        <div class="user-badge">
            <div class="avatar">{{ session['username'][0]|upper }}</div>
            <span class="username">{{ session['username'] }}</span>
        </div>

        <nav class="sidebar-nav">
            <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span class="nav-label">Home</span>
            </a>
            <a href="/profile" class="nav-item {% if request.path == '/profile' %}active{% endif %}">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
                <span class="nav-label">Profile</span>
            </a>
            <a href="/playlist" class="nav-item {% if request.path == '/playlist' or request.path.startswith('/playlist/') %}active{% endif %}">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                <span class="nav-label">Playlist</span>
            </a>
            <a href="/history" class="nav-item {% if request.path == '/history' %}active{% endif %}">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span class="nav-label">History</span>
            </a>
            <a href="/settings" class="nav-item {% if request.path == '/settings' %}active{% endif %}">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span class="nav-label">Settings</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="/logout" class="nav-item logout-link">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span class="nav-label">Logout</span>
            </a>
        </div>
    </aside>

    <div class="content-area">
        <main class="main-content">
            {% block app_content %}{% endblock %}
        </main>

        <footer class="persistent-player" id="persistent-player">
            <div class="player-left">
                <div class="player-current-info" id="player-info" title="Now Playing">
                    <img id="player-thumb" class="player-thumb" src="{{ url_for('static', filename='images/default_cover.png') }}" onerror="this.style.display='none';" alt="Album Art">
                    <div class="player-text-info">
                        <span id="player-song-title" class="player-song-title">No song playing</span>
                        <span id="player-song-artist" class="player-song-artist">—</span>
                    </div>
                </div>
                <div class="player-visualizer" id="player-visualizer-sm">
                    <div class="vis-bar"></div>
                    <div class="vis-bar"></div>
                    <div class="vis-bar"></div>
                    <div class="vis-bar"></div>
                    <div class="vis-bar"></div>
                </div>
            </div>

            <div class="player-center">
                <div class="player-controls-buttons">
                    <button class="player-btn" id="player-prev" title="Previous">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                    </button>
                    <button class="player-btn-main" id="player-play" title="Play/Pause">
                        <svg viewBox="0 0 24 24" fill="currentColor" id="play-icon"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    </button>
                    <button class="player-btn" id="player-next" title="Next">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                    </button>
                </div>
                <div class="playback-bar">
                    <span class="playback-time" id="player-current-time">0:00</span>
                    <input type="range" class="track-slider" id="player-progress" value="0" min="0" max="100" step="0.1">
                    <span class="playback-time" id="player-total-time">0:00</span>
                </div>
            </div>

            <div class="player-right">
                <button class="player-btn" id="player-like-btn" title="Like">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="like-icon"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
                </button>
                <button class="player-btn" id="player-dislike-btn" title="Dislike">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="dislike-icon"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/></svg>
                </button>
                <button class="player-btn" id="player-volume-btn" title="Volume">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                </button>
                <input type="range" class="volume-slider" id="player-volume" min="0" max="1" step="0.01" value="0.7">
                <button class="player-btn" id="player-expand-btn" title="Now Playing View">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                </button>
            </div>

            <audio id="persistent-audio" preload="auto"></audio>
        </footer>
    </div>
</div>

{% block bottom_player %}{% endblock %}

<script>
(function() {
    'use strict';

    // ===== PERSISTENT PLAYER DOM SETUP =====
    var audio = document.getElementById('persistent-audio');
    audio.autoplay = false;
    audio.onerror = function() {
        console.log('Audio source failed, switching to fallback stream');
        audio.src = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
        audio.load();
        audio.play().catch(function(err) { console.log('Fallback play error:', err); });
    };

    var playBtn = document.getElementById('player-play');
    var prevBtn = document.getElementById('player-prev');
    var nextBtn = document.getElementById('player-next');
    var progress = document.getElementById('player-progress');
    var curTime = document.getElementById('player-current-time');
    var totalTime = document.getElementById('player-total-time');
    var volumeSlider = document.getElementById('player-volume');
    var volumeBtn = document.getElementById('player-volume-btn');
    volumeSlider.style.setProperty('--vol-progress', (volumeSlider.value * 100) + '%');
    var thumb = document.getElementById('player-thumb');
    var songTitle = document.getElementById('player-song-title');
    var songArtist = document.getElementById('player-song-artist');
    var playerBar = document.getElementById('persistent-player');
    var expandBtn = document.getElementById('player-expand-btn');

    var currentSong = null;

    // ===== SPA NAVIGATION =====
    window.navigateTo = function(url, doPushState) {
        if (doPushState === undefined) doPushState = true;
        if (!url || url.startsWith('http') || url.startsWith('//') || url.startsWith('javascript:')) return;
        if (url.startsWith('/logout') || url.startsWith('/login') || url.startsWith('/register')) {
            window.location.href = url;
            return;
        }

        var mainContent = document.querySelector('.main-content');
        mainContent.classList.add('page-transitioning');

        fetch(url)
            .then(function(res) { return res.text(); })
            .then(function(html) {
                var parser = new DOMParser();
                var doc = parser.parseFromString(html, 'text/html');
                var newContent = doc.querySelector('.main-content');
                var newTitle = doc.querySelector('title');

                if (newContent) {
                    mainContent.innerHTML = newContent.innerHTML;
                    if (newTitle) document.title = newTitle.textContent;
                    if (doPushState) history.pushState({ url: url }, '', url);
                    updateActiveNav(url);
                    reExecuteScripts(mainContent);
                    if (typeof window._onContentSwapped === 'function') {
                        window._onContentSwapped();
                    }
                    // Force layout reset for player page after dynamic load
                    window.scrollTo({ top: 0, behavior: 'instant' });
                    var pc = document.querySelector('.player-page-container');
                    var ls = document.querySelector('.player-main');
                    if (pc) {
                        pc.scrollTop = 0;
                        pc.style.display = 'flex';
                        pc.style.alignItems = 'center';
                        pc.style.justifyContent = 'center';
                        pc.style.setProperty('display', 'flex', 'important');
                        pc.style.setProperty('align-items', 'center', 'important');
                        pc.style.setProperty('justify-content', 'center', 'important');
                        pc.style.setProperty('height', 'calc(100vh - 90px)', 'important');
                        pc.style.setProperty('overflow-y', 'auto', 'important');
                    }
                    if (ls) {
                        ls.style.setProperty('align-self', 'center', 'important');
                        ls.style.setProperty('margin-top', '0', 'important');
                    }
                }
                mainContent.classList.remove('page-transitioning');
            })
            .catch(function() {
                window.location.href = url;
            });
    };

    function reExecuteScripts(container) {
        container.querySelectorAll('script').forEach(function(oldScript) {
            if (oldScript.type && oldScript.type !== 'text/javascript' && oldScript.type !== '') return;
            var newScript = document.createElement('script');
            if (oldScript.src) {
                newScript.src = oldScript.src;
            } else {
                newScript.textContent = oldScript.textContent;
            }
            oldScript.replaceWith(newScript);
        });
    }

    function updateActiveNav(url) {
        document.querySelectorAll('.nav-item').forEach(function(item) {
            item.classList.remove('active');
            if (item.getAttribute('href') === url) {
                item.classList.add('active');
            }
        });
    }

    document.addEventListener('click', function(e) {
        var link = e.target.closest('a');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('//') || href.startsWith('javascript:')) return;
        if (href.startsWith('/logout') || href.startsWith('/login') || href.startsWith('/register')) return;
        e.preventDefault();
        navigateTo(href);
    });

    window.addEventListener('popstate', function(e) {
        if (e.state && e.state.url) {
            navigateTo(e.state.url, false);
        }
    });

    // ===== SONG LOADING =====
    function loadSong(song) {
        if (!song) return;
        currentSong = song;

        songTitle.textContent = song.title || 'Unknown';
        songArtist.textContent = song.artist || '—';

        var src = song.file_path;
        if (!src || src.includes('undefined') || src.trim() === '' || src === '/') {
            src = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
        }

        thumb.style.display = 'block';
        if (song.image_url) {
            thumb.src = song.image_url;
        } else {
            thumb.src = '{{ url_for('static', filename='images/default_cover.png') }}';
        }

        if (audio.getAttribute('src') !== src) {
            audio.src = src;
            audio.load();
        }

        playerBar.classList.remove('idle');
        updatePlayBtn();
    }

    // Register with early listener
    window.__playerReady(loadSong);

    // ===== PLAYBACK CONTROLS =====
    function updatePlayBtn() {
        if (audio.paused) {
            playBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
        } else {
            playBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
        }
    }

    playBtn.addEventListener('click', function() {
        if (audio.paused) {
            audio.play();
        } else {
            audio.pause();
        }
    });

    audio.addEventListener('play', function() {
        updatePlayBtn();
        playerBar.classList.add('is-playing');
        document.body.classList.add('is-playing');
        localStorage.setItem('audio_playing', 'true');
    });

    audio.addEventListener('pause', function() {
        updatePlayBtn();
        playerBar.classList.remove('is-playing');
        document.body.classList.remove('is-playing');
        localStorage.setItem('audio_playing', 'false');
    });

    audio.addEventListener('ended', function() {
        localStorage.setItem('audio_playing', 'false');
    });

    audio.addEventListener('timeupdate', function() {
        if (audio.duration) {
            var pct = (audio.currentTime / audio.duration) * 100;
            progress.value = pct;
            progress.style.setProperty('--progress', pct + '%');
            curTime.textContent = formatTime(audio.currentTime);
        }
    });

    audio.addEventListener('loadedmetadata', function() {
        totalTime.textContent = formatTime(audio.duration);
    });

    // Restore playback state across full page reloads
    var wasPlaying = localStorage.getItem('audio_playing');
    if (wasPlaying === 'false' && audio.src && !audio.paused) {
        audio.pause();
    } else if (wasPlaying === 'true' && audio.src) {
        audio.play().catch(function() {});
    }

    progress.addEventListener('input', function() {
        if (audio.duration) {
            audio.currentTime = (this.value / 100) * audio.duration;
        }
    });

    volumeSlider.addEventListener('input', function() {
        audio.volume = this.value;
        this.style.setProperty('--vol-progress', (this.value * 100) + '%');
        updateVolumeIcon();
    });

    function updateVolumeIcon() {
        var v = audio.volume;
        var icon;
        if (v === 0) {
            icon = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';
        } else if (v < 0.5) {
            icon = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>';
        } else {
            icon = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>';
        }
        volumeBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' + icon + '</svg>';
    }

    // ===== LIKE / DISLIKE (sync via custom event) =====
    var likeBtn = document.getElementById('player-like-btn');
    var dislikeBtn = document.getElementById('player-dislike-btn');

    // Shared UI updater — listens for like:sync and updates ALL button sets
    window.addEventListener('like:sync', function(e) {
        var liked = e.detail.liked;
        // Player bar buttons
        likeBtn.classList.remove('active');
        dislikeBtn.classList.remove('active');
        if (liked === 1) likeBtn.classList.add('active');
        else if (liked === 0) dislikeBtn.classList.add('active');
        // Player page buttons (if present)
        var pl = document.getElementById('player-page-like');
        var pd = document.getElementById('player-page-dislike');
        if (pl) { pl.classList.remove('active'); if (liked === 1) pl.classList.add('active'); }
        if (pd) { pd.classList.remove('active'); if (liked === 0) pd.classList.add('active'); }
    });

    function fetchLikeStatus(songId) {
        if (!songId) return;
        fetch('/api/like_status/' + songId)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                window.dispatchEvent(new CustomEvent('like:sync', { detail: { liked: data.liked } }));
            })
            .catch(function() {});
    }

    function sendLike(songId, liked) {
        fetch('/like/' + songId, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ liked: liked })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.success) {
                fetchLikeStatus(songId);
            }
        })
        .catch(function(err) { console.error(err); });
    }

    likeBtn.addEventListener('click', function() {
        if (currentSong && currentSong.id) {
            var isLiked = this.classList.contains('active');
            sendLike(currentSong.id, !isLiked);
        }
    });

    dislikeBtn.addEventListener('click', function() {
        if (currentSong && currentSong.id) {
            var isDisliked = this.classList.contains('active');
            sendLike(currentSong.id, isDisliked ? null : false);
        }
    });

    // Update like status when song changes
    var origLoadSong = loadSong;
    loadSong = function(song) {
        origLoadSong(song);
        if (song && song.id) {
            fetchLikeStatus(song.id);
        }
    };

    nextBtn.addEventListener('click', function() {
        goToNextTrack();
    });

    prevBtn.addEventListener('click', function() {
        if (audio.currentTime > 3) {
            audio.currentTime = 0;
        }
    });

    audio.addEventListener('ended', function() {
        goToNextTrack();
    });

    function goToNextTrack() {
        var recs = document.querySelectorAll('.rec-list .rec-item');
        if (recs.length > 0 && currentSong && currentSong.id) {
            var currentUrl = '/player/' + currentSong.id;
            for (var i = 0; i < recs.length; i++) {
                if (recs[i].getAttribute('href') === currentUrl) {
                    var next = recs[i + 1];
                    if (next) {
                        navigateTo(next.getAttribute('href'));
                        return;
                    }
                    break;
                }
            }
            // Current song not found or last in list — wrap to first
            navigateTo(recs[0].getAttribute('href'));
            return;
        }
        // Fallback if no Up Next queue
        if (currentSong && currentSong.id) {
            var plId = null;
            var m = window.location.search.match(/[?&]playlist_id=(\d+)/);
            if (m) plId = parseInt(m[1], 10);
            var body = { song_id: currentSong.id };
            if (plId) body.playlist_id = plId;
            fetch('/smart_next', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.status === 'success' && data.song) {
                    var nextUrl = '/player/' + data.song.id;
                    if (plId) nextUrl += '?playlist_id=' + plId;
                    navigateTo(nextUrl);
                }
            })
            .catch(function(err) { console.log('Next track error:', err); });
        }
    }

    // ===== EXPAND BUTTON =====
    expandBtn.addEventListener('click', function() {
        if (currentSong && currentSong.id) {
            navigateTo('/player/' + currentSong.id);
        }
    });

    function formatTime(secs) {
        if (isNaN(secs) || !isFinite(secs)) return '0:00';
        var m = Math.floor(secs / 60);
        var s = Math.floor(secs % 60);
        return m + ':' + (s < 10 ? '0' : '') + s;
    }

    // ===== RESTORE PLAYER STATE FROM SESSION STORAGE =====
    // Skip when on a player page: server already provides the correct song data,
    // so we must not overwrite it with stale session data.
    if (!window.location.pathname.match(/^\/player\/\d+/)) {
        (function() {
            var savedSong = sessionStorage.getItem('currentSong');
            if (savedSong) {
                try {
                    var song = JSON.parse(savedSong);
                    var savedTime = parseFloat(sessionStorage.getItem('currentTime') || '0');
                    window.dispatchEvent(new CustomEvent('song:play', { detail: song }));
                    audio.currentTime = savedTime;
                } catch(e) {}
            }
        })();
    }

    window.addEventListener('beforeunload', function() {
        if (currentSong) {
            sessionStorage.setItem('currentSong', JSON.stringify(currentSong));
            sessionStorage.setItem('currentTime', audio.currentTime.toString());
        }
    });
})();
</script>
{% endblock %}
