<!DOCTYPE html>
<html>
<head>
    <title>Register - Music App</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #121212; color: white; }
        .card { background: #181818; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 300px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #333; border-radius: 5px; background: #282828; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #1DB954; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background-color: #19a446; }
        a { color: #1DB954; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Create Account</h2>
        <form action="/register" method="POST">
            <input type="text" name="username" placeholder="Choose a Username" required>
            <input type="password" name="password" placeholder="Create a Password" required>
            <button type="submit">Register</button>
        </form>
        <p style="font-size: 14px; margin-top: 15px;">දැනටමත් ගිණුමක් තියෙනවාද? <br> <a href="/login">Login මෙතනින්</a></p>
    </div>
</body>
</html>
